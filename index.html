<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Дневник вайб-кодинга</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <h1>Дневник вайб-кодинга</h1>
        <p class="lead">
          Заметки о пути от нуля к автоматизациям, бизнес-задачам и стартапу. Данные лежат в
          <code>data/diary-entries.js</code> — правила внесения описаны в README проекта.
        </p>
      </header>

      <div class="toolbar">
        <label>
          Область
          <select id="filter-area" aria-label="Фильтр по области"></select>
        </label>
        <label>
          Поиск
          <input type="search" id="filter-query" placeholder="тема, текст, инструмент…" autocomplete="off" />
        </label>
        <span class="meta-count">Записей: <strong id="entry-count">0</strong></span>
      </div>

      <div id="empty-state" hidden>Нет записей по выбранным фильтрам.</div>
      <div id="diary-list"></div>

      <footer class="site-footer">
        Открой <code>index.html</code> в браузере или подними локальный сервер из папки проекта.
      </footer>
    </div>

    <script src="data/areas.js"></script>
    <script src="data/diary-entries.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
